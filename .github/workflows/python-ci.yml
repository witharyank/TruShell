name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.11, 3.12]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
        
      - name: Install build tools
        run: python -m pip install --upgrade hatchling build
        
      - name: Install package and dev dependencies
        # CHANGE THIS LINE: Added [dev] to install pytest and other test tools
        run: python -m pip install -e ".[dev]"
        
      - name: Run tests
        run: python -m pytest
        
      - name: Check CLI help
        run: |
          python -m trushell --help
          trushell --help
          
      - name: Build wheel
        run: python -m build --wheel
